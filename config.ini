archivo_sonido = alarma.wav      ; ruta a WAV
repetir = no                     ; si / no
solo_importantes = si            ; si / no (solo cuando supera umbral_gb)

[EXCLUIDOS]
carpetas = C:\Windows|C:\Program Files
